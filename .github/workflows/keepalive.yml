name: Supabase keep-alive

# Supabase free-tier projects pause after ~7 days of inactivity. This pings the
# REST API once a day so the nlp-textbook-rag database never sleeps.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL              e.g. https://abcd1234.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY the service_role key (bypasses RLS for the ping)

on:
  schedule:
    - cron: "17 9 * * *" # daily at 09:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query nlp_chunks (counts as activity)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/nlp_chunks?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "Keep-alive ping failed (HTTP $code)"; exit 1
          fi
          echo "Supabase project pinged successfully."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
